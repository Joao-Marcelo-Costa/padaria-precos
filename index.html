<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panificadora Pequeno Príncipe</title>
  </head>
  <body>
    <header>
      <h1>Receitas</h1>
    </header>
    <section class="recepies">
      <header>
        <div>
          <h3>Receitas</h3>
          <button class="button_add_recepies">
            <img src="/public/add_icon.png" alt="botão de adicionar receitas" />
          </button>
        </div>
        <hr class="receitas_line" />
      </header>
    </section>

    <dialog class="add_recepie_window">
      <div class="add_receipe_window_conteiner">
        <div class="add_receipe_window_content">
          <button class="x_close_button close_button">
            <img src="/public/close_icon.png" alt="botão de fechar janela" />
          </button>
          <h4>Adicionar Receita</h4>
          <label for="receitaNome">Nome da receita:</label>
          <input
            type="text"
            id="receitaNome"
            placeholder="Nome da receita"
            class="add_recepie_name"
            required
          /><br />
          <label for="receitaUnidade">Unidade:</label>
          <select
            name="receitaUnidade"
            id="receitaUnidade"
            class="add_recepie_unity"
          >
            <option value="UN">UN</option>
            <option value="Kg">Kg</option>
            <option value="100g">100g</option>
          </select>
          <br />
          <label for="receitaRendimento">Rendimento:</label>
          <input
            type="number"
            id="receitaRendimento"
            placeholder="Quantos rende ?"
            class="add_recipie_amount"
            required
          />

          <header>
            <label for="add_insume_button">ingredientes</label>
            <button class="add_insume_button" id="add_insume_button">
              <img src="/public/add_icon.png" alt="botão de adicionar insumo" />
            </button>
            <hr class="receitas_line" />
          </header>

          <table class="add_insume_table">
            <tbody class="add_insume_table_tbody"></tbody>
          </table>
        </div>

        <div class="add_recepie_window_buttons_container">
          <button id="cancelar" class="cancel_button">Cancelar</button>
          <button id="salvar" class="save_button">Salvar</button>
        </div>
      </div>
    </dialog>
    <section class="recepies_section"></section>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panificadora Pequeno Príncipe</title>
  </head>
  <body>
    <header>
      <h1>Receitas</h1>
    </header>
    <section class="recepies">
      <header>
        <div>
          <h3>Receitas</h3>
          <button class="button_add_recepies">
            <img src="/public/add_icon.png" alt="botão de adicionar receitas" />
          </button>
        </div>
        <hr class="receitas_line" />
      </header>
    </section>

    <dialog class="add_recepie_window">
      <button class="close_button">
        <img src="/public/close_icon.png" alt="botão de fechar janela" />
      </button>
      <h4>Adicionar Receita</h4>
      <label for="receitaNome">Nome da receita</label>
      <input
        type="text"
        id="receitaNome"
        placeholder="Nome da receita"
        required
      />

      <div class="add_insume_container">
        <header>
          <label for="add_insume_button">ingredientes</label>
          <button class="add_insume_button" id="add_insume_button">
            <img src="/public/add_icon.png" alt="botão de adicionar insumo" />
          </button>
          <hr class="receitas_line" />
        </header>
        <table class="add_insume_table">
          <thead>
            <tr>
              <td><p>Nome</p></td>
              <td><p>Quantidaed</p></td>
              <td><p>Preço por quantidade</p></td>
              <td><p>Preço total</p></td>
            </tr>
          </thead>
        </table>
      </div>
      <button id="cancelar">Cancelar</button>
      <button id="salvar">Salvar</button>
    </dialog>

    <script type="module" src="/src/script.js"></script>
  </body>
</html>

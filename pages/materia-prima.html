<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="../public/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panificadora Pequeno Príncipe Insumos</title>
  </head>
  <body>
    <h1 class="insumos-main-title">Insumos</h1>
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Unidade</th>
          <th>Valor Total</th>
          <th>Quantidade</th>
          <th>Valor Fracionado</th>
          <th class="button-file">
            <button>
              <img
                src="/public/add_icon.png"
                alt="imagem do simbolo de mais representando o botão de adicionar insumo"
                id="add_button"
              />
            </button>
          </th>
        </tr>
      </thead>
      <tbody class="table_body">
        <tr>
          <td>abacaxi</td>
          <td>UN</td>
          <td>3</td>
          <td>4</td>
          <td>5</td>
          <td>
            <button>
              <img src="/public/edit_icon.png" alt="botão de editar" />
            </button>
            <button>
              <img src="/public/delete_icon.png" alt="botão de deletar" />
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <form id="formularioAdicionarInsumo" action="" class="hidden">
      <input type="text" id="nome" placeholder="Nome do insumo" required />
      <input type="text" id="valorTotal" placeholder="R$0,00" required />
      <input
        type="number"
        id="quantidade"
        placeholder="quantidade por embalagem"
        required
      />
      <select id="unidade" required>
        <option>UN</option>
        <option>Kg</option>
        <option>g</option>
        <option>100g</option>
        <option>L</option>
        <option>mL</option>
      </select>
      <button id="botaoCancelar" type="button">Cancelar</button>
      <button id="botaoSalvar" type="submit">Salvar</button>
    </form>

    <script type="module" src="/pages/materia-prima.js"></script>
  </body>
</html>
